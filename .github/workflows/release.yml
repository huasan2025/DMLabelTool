name: release-build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libdmtx

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller build

      - name: Build wheel
        run: python -m build

      - name: Build GUI artifact
        run: pyinstaller packaging/dm_label_tool_gui.spec

      - name: Archive build folder
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/DMLabelTool/* -DestinationPath dist/DMLabelTool-windows.zip

      - name: Archive build folder (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r DMLabelTool-macos.zip DMLabelTool

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DMLabelTool-${{ runner.os }}
          path: |
            dist/*.zip
            dist/*.whl
            dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: DMLabelTool-macOS
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: DMLabelTool-Windows
          path: release-assets

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
